name: build
on: [push, workflow_dispatch]
jobs:
  img:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "CACHE_KEY=$(sha256sum rust/Cargo.lock | cut -d' ' -f1)" >> $GITHUB_ENV
      - run: docker buildx build -t pwnghost-rootfs --target runtime --load rust/
      - run: docker export $(docker create pwnghost-rootfs) | gzip > rootfs.tar.gz
      - run: cp rootfs.tar.gz rust/ && cd rust && docker run --rm --privileged -v $PWD/..:/src pwnghost-rootfs bash -c "
          apt-get update -qq && apt-get install -y -qq python3 parted e2fsprogs dosfstools kpartx curl 2>&1 | tail -1
          && python3 /src/scripts/make-image.py"
      - uses: actions/upload-artifact@v4
        with:
          name: pwnghost
          path: pwnghost.img
